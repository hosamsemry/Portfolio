{% extends "base.html" %}
{% load static %}
{% block content1 %}
<div class="container my-5">
  <h2 class="text-center mb-4" style="color: #4fffb0;">My Projects</h2>

  {% for project in projects %}
  <div class="project-card">
    <h4>Project Name: <span class="text-light">{{ project.name }}</span></h4>
    <p><strong>GitHub:</strong> <a href="{{ project.github }}" class="github" target="_blank">{{ project.github }}</a></p>
    <p><strong>Description:</strong> <span class="description">{{ project.description }}</span></p>

  </div>
  <hr>
  {% endfor %}

</div>
{% endblock content1 %}
